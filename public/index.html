<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГДА 6 - Parody Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; font-family: Arial; z-index: 10; }
        #menu h1 { font-size: 48px; margin-bottom: 40px; }
        #menu button { padding: 10px 20px; font-size: 18px; margin: 10px; cursor: pointer; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: Arial; font-size: 14px; }
        #chatMessages { max-height: 100px; overflow-y: auto; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>ГДА 6</h1>
        <button id="singleBtn">Single Player</button>
        <button id="multiBtn">Multiplayer</button>
        <div id="multiOptions" style="display:none;">
            <input id="nickname" type="text" placeholder="Enter nickname" maxlength="20">
            <button id="startMultiBtn">Start Multiplayer</button>
        </div>
        <button id="settingsBtn">Settings</button>
    </div>
    <div id="ui" style="display:none;">Controls: WASD move, Q/E rotate camera, RMB+drag rotate camera, Mouse look, E enter/exit car, Left click shoot NPCs. Police (blue) chase if in car or wanted.<br>Wanted Level: <span id="wanted">0</span><br><input id="chatInput" type="text" placeholder="Chat..." style="width:200px;"><div id="chatMessages"></div></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();

        let isMultiplayer = false;
        let nickname = 'Player';
        let gameStarted = false;
        let socket;

        // Menu
        document.getElementById('singleBtn').addEventListener('click', () => {
            isMultiplayer = false;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            startGame();
        });
        document.getElementById('multiBtn').addEventListener('click', () => {
            document.getElementById('multiOptions').style.display = 'block';
        });
        document.getElementById('startMultiBtn').addEventListener('click', () => {
            nickname = document.getElementById('nickname').value || 'Player';
            isMultiplayer = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            startGame();
        });
        document.getElementById('settingsBtn').addEventListener('click', () => {
            alert('Settings not implemented yet');
        });

        function startGame() {
            if (isMultiplayer) {
                socket = io(window.location.origin);
                setupSocket();
            }
            // Game already initialized
        }

        function setupSocket() {
            // Socket events
            socket.on('init', (players) => {
                Object.keys(players).forEach(id => {
                    if (id !== socket.id) {
                        createOtherPlayer(id, players[id]);
                    }
                });
            });

            socket.on('playerJoined', (playerData) => {
                createOtherPlayer(playerData.id, playerData);
                addChatMessage(`${playerData.nickname || 'Player'} joined`);
            });

            socket.on('playerMoved', (data) => {
                if (otherPlayers[data.id]) {
                    otherPlayers[data.id].targetPosition.copy(data.position);
                }
            });

            socket.on('playerLeft', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
                addChatMessage(`${id} left`);
            });

            socket.on('chatMessage', (data) => {
                addChatMessage(`${data.nickname || 'Player'}: ${data.message}`);
            });
        }

        // Player (load GLTF model or fallback to cylinder)
        let player = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8), new THREE.MeshBasicMaterial({color: 0xff0000}));
        player.position.set(0, 1.5, 0);
        scene.add(player);

        // Temporarily disable GLTF to fix black screen
        // let mixer;
        // const loader = new THREE.GLTFLoader();
        // loader.load(...);

        // Player gun (improved model)
        const gunGroup = new THREE.Group();
        const gunBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8), new THREE.MeshBasicMaterial({color: 0x333333}));
        gunBarrel.rotation.z = Math.PI / 2;
        gunBarrel.position.set(0.3, 0, 0);
        gunGroup.add(gunBarrel);
        const gunHandle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.1), new THREE.MeshBasicMaterial({color: 0x8B4513}));
        gunHandle.position.set(0, -0.1, 0);
        gunGroup.add(gunHandle);
        gunGroup.position.set(0.3, 0.5, 0.5); // Adjust position relative to model
        player.add(gunGroup);

        // Camera follow player
        camera.position.set(0, 5, 10);
        camera.lookAt(player.position);

        // City: Streets and buildings
        const groundGeometry = new THREE.PlaneGeometry(200, 200);
        const groundMaterial = new THREE.MeshBasicMaterial({color: 0x333333});
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Buildings
        const buildings = [];
        for (let i = 0; i < 20; i++) {
            const height = Math.random() * 10 + 5;
            const buildingGeometry = new THREE.BoxGeometry(5, height, 5);
            const buildingMaterial = new THREE.MeshBasicMaterial({color: Math.random() * 0xffffff});
            const building = new THREE.Mesh(buildingGeometry, buildingMaterial);
            building.position.set((Math.random() - 0.5) * 100, height / 2, (Math.random() - 0.5) * 100);
            scene.add(building);
            buildings.push(building);

            // Windows on all sides
            const windowMaterial = new THREE.MeshBasicMaterial({color: 0xffff00, transparent: true, opacity: 0.8});
            const sides = [
                {pos: [0, 0, 2.51], rot: [0, 0, 0]}, // front
                {pos: [0, 0, -2.51], rot: [0, Math.PI, 0]}, // back
                {pos: [-2.51, 0, 0], rot: [0, Math.PI / 2, 0]}, // left
                {pos: [2.51, 0, 0], rot: [0, -Math.PI / 2, 0]} // right
            ];
            sides.forEach(side => {
                for (let w = 0; w < 2; w++) {
                    const windowGeom = new THREE.PlaneGeometry(0.8, 0.8);
                    const windowMesh = new THREE.Mesh(windowGeom, windowMaterial);
                    windowMesh.position.set(side.pos[0] + (Math.random() - 0.5) * 1, Math.random() * height * 0.8 + height * 0.1, side.pos[2]);
                    windowMesh.rotation.set(side.rot[0], side.rot[1], side.rot[2]);
                    building.add(windowMesh);
                }
            });

            // Door on front
            const doorMaterial = new THREE.MeshBasicMaterial({color: 0x8B4513});
            const door = new THREE.Mesh(new THREE.PlaneGeometry(1, 2), doorMaterial);
            door.position.set(0, 1, 2.51);
            building.add(door);
        }

        // Trees
        for (let i = 0; i < 50; i++) {
            const treeGeometry = new THREE.CylinderGeometry(0.5, 0.5, 3);
            const treeMaterial = new THREE.MeshBasicMaterial({color: 0x228b22});
            const tree = new THREE.Mesh(treeGeometry, treeMaterial);
            tree.position.set((Math.random() - 0.5) * 100, 1.5, (Math.random() - 0.5) * 100);
            scene.add(tree);
        }

        // Cars (box + wheels)
        const cars = [];
        const carModels = [
            {name: 'Шкода 3000', color: 0xff0000},
            {name: 'Лада Калина', color: 0x0000ff},
            {name: 'Волга Газ', color: 0x00ff00}
        ];
        for (let i = 0; i < 10; i++) {
            const model = carModels[Math.floor(Math.random() * carModels.length)];
            const carGroup = new THREE.Group();

            // Car body
            const carBodyGeometry = new THREE.BoxGeometry(4, 1, 2);
            const carBodyMaterial = new THREE.MeshBasicMaterial({color: model.color});
            const carBody = new THREE.Mesh(carBodyGeometry, carBodyMaterial);
            carGroup.add(carBody);

            // Windows
            const windowMaterial = new THREE.MeshBasicMaterial({color: 0x87ceeb, transparent: true, opacity: 0.3});
            const frontWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.8), windowMaterial);
            frontWindow.position.set(0, 0.4, 1);
            carGroup.add(frontWindow);
            const backWindow = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 0.8), windowMaterial);
            backWindow.position.set(0, 0.4, -1);
            carGroup.add(backWindow);
            const leftWindow = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 0.8), windowMaterial);
            leftWindow.rotation.y = Math.PI / 2;
            leftWindow.position.set(-2, 0.4, 0);
            carGroup.add(leftWindow);
            const rightWindow = new THREE.Mesh(new THREE.PlaneGeometry(2.5, 0.8), windowMaterial);
            rightWindow.rotation.y = -Math.PI / 2;
            rightWindow.position.set(2, 0.4, 0);
            carGroup.add(rightWindow);

            // Wheels
            const wheelGeometry = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 8);
            const wheelMaterial = new THREE.MeshBasicMaterial({color: 0x333333});
            const wheelPositions = [
                [-1.5, -0.5, 1], [1.5, -0.5, 1], [-1.5, -0.5, -1], [1.5, -0.5, -1]
            ];
            wheelPositions.forEach(pos => {
                const wheel = new THREE.Mesh(wheelGeometry, wheelMaterial);
                wheel.position.set(pos[0], pos[1], pos[2]);
                wheel.rotation.z = Math.PI / 2;
                carGroup.add(wheel);
            });

            carGroup.position.set((Math.random() - 0.5) * 100, 0.5, (Math.random() - 0.5) * 100);
            carGroup.userData = {occupied: false, model: model.name};
            scene.add(carGroup);
            cars.push(carGroup);
        }

        // NPCs (capsules with guns, some police)
        const npcs = [];
        for (let i = 0; i < 20; i++) {
            const isPolice = i < 5; // First 5 are police
            const npcGeometry = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8);
            const npcMaterial = new THREE.MeshBasicMaterial({color: isPolice ? 0x0000ff : 0xffff00});
            const npc = new THREE.Mesh(npcGeometry, npcMaterial);
            npc.position.set((Math.random() - 0.5) * 100, 1.5, (Math.random() - 0.5) * 100);
            npc.userData = {direction: new THREE.Vector3(Math.random() - 0.5, 0, Math.random() - 0.5).normalize(), type: isPolice ? 'police' : 'civilian'};

            // NPC gun
            const npcGunGroup = new THREE.Group();
            const npcGunBarrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.6, 8), new THREE.MeshBasicMaterial({color: 0x333333}));
            npcGunBarrel.rotation.z = Math.PI / 2;
            npcGunBarrel.position.set(0.3, 0, 0);
            npcGunGroup.add(npcGunBarrel);
            const npcGunHandle = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.2, 0.1), new THREE.MeshBasicMaterial({color: 0x8B4513}));
            npcGunHandle.position.set(0, -0.1, 0);
            npcGunGroup.add(npcGunHandle);
            npcGunGroup.position.set(0.3, 0.5, 0.5);
            npc.add(npcGunGroup);

            scene.add(npc);
            npcs.push(npc);
        }

        // Other players
        const otherPlayers = {};

        // Controls
        let keys = {};
        let mouse = {x: 0, y: 0};
        let isInCar = false;
        let currentCar = null;
        let playerSpeed = 0.1;
        let carSpeed = 0.2;
        let rotationSpeed = 0.02;
        let cameraAngle = 0; // Camera rotation around player
        let wantedLevel = 0;
        let isRightMouseDown = false;
        let lastMouseX = 0;

        document.addEventListener('keydown', (e) => { keys[e.code] = true; });
        document.addEventListener('keyup', (e) => { keys[e.code] = false; });
        document.addEventListener('mousemove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            if (isRightMouseDown) {
                cameraAngle += (e.clientX - lastMouseX) * 0.005;
                lastMouseX = e.clientX;
            }
        });
        document.addEventListener('pointerlockchange', () => {
            document.pointerLockElement ? document.addEventListener('mousemove', onMouseMove) : document.removeEventListener('mousemove', onMouseMove);
        });
        function onMouseMove(e) {
            player.rotation.y -= e.movementX * 0.002;
        }
        renderer.domElement.addEventListener('click', () => {
            renderer.domElement.requestPointerLock();
        });
        renderer.domElement.addEventListener('mousedown', (e) => {
            if (e.button === 0 && !isInCar) { // Left click to shoot
                shoot();
            }
            if (e.button === 2) { // Right click to rotate camera
                isRightMouseDown = true;
                lastMouseX = e.clientX;
                e.preventDefault();
            }
        });
        renderer.domElement.addEventListener('mouseup', (e) => {
            if (e.button === 2) {
                isRightMouseDown = false;
            }
        });
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault()); // Disable context menu

        function shoot() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(npcs);
            if (intersects.length > 0) {
                const hitNpc = intersects[0].object;
                scene.remove(hitNpc);
                npcs.splice(npcs.indexOf(hitNpc), 1);
                wantedLevel += 1; // Increase wanted level
            }
        }

        function addChatMessage(msg) {
            const div = document.getElementById('chatMessages');
            div.innerHTML += '<div>' + msg + '</div>';
            div.scrollTop = div.scrollHeight;
        }

        document.getElementById('chatInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const msg = e.target.value;
                if (msg.trim()) {
                    if (isMultiplayer) socket.emit('chatMessage', msg);
                    addChatMessage('You: ' + msg);
                    e.target.value = '';
                }
            }
        });

        // Socket events
        socket.on('init', (players) => {
            Object.keys(players).forEach(id => {
                if (id !== socket.id) {
                    createOtherPlayer(id, players[id]);
                }
            });
        });

        socket.on('playerJoined', (playerData) => {
            createOtherPlayer(playerData.id, playerData);
            addChatMessage(`Player ${playerData.id} joined`);
        });

        socket.on('playerMoved', (data) => {
            if (otherPlayers[data.id]) {
                otherPlayers[data.id].targetPosition.copy(data.position);
            }
        });

        socket.on('playerLeft', (id) => {
            if (otherPlayers[id]) {
                scene.remove(otherPlayers[id]);
                delete otherPlayers[id];
            }
            addChatMessage(`Player ${id} left`);
        });

        socket.on('chatMessage', (data) => {
            addChatMessage(`${data.id}: ${data.message}`);
        });

        function createOtherPlayer(id, data) {
            const geometry = new THREE.CylinderGeometry(0.5, 0.5, 1.5, 8);
            const material = new THREE.MeshBasicMaterial({color: Math.random() * 0xffffff});
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(data.position);
            mesh.targetPosition = new THREE.Vector3().copy(data.position);

            // Other player gun
            const otherGunGeometry = new THREE.BoxGeometry(0.2, 0.1, 0.5);
            const otherGunMaterial = new THREE.MeshBasicMaterial({color: 0x000000});
            const otherGun = new THREE.Mesh(otherGunGeometry, otherGunMaterial);
            otherGun.position.set(0.3, 0.5, 0.5);
            mesh.add(otherGun);

            scene.add(mesh);
            otherPlayers[id] = mesh;
        }

        function updatePlayer() {
            if (!isInCar) {
                let moveX = 0, moveZ = 0;
                if (keys.KeyW) moveZ -= 1;
                if (keys.KeyS) moveZ += 1;
                if (keys.KeyA) moveX -= 1;
                if (keys.KeyD) moveX += 1;

                const direction = new THREE.Vector3(moveX, 0, moveZ).normalize();
                if (direction.length() > 0) {
                    const newPos = player.position.clone().add(direction.multiplyScalar(playerSpeed));
                    const collision = buildings.some(b => newPos.distanceTo(b.position) < 3);
                    if (!collision) {
                        player.position.copy(newPos);
                    }
                }

                // Camera rotation
                if (keys.KeyQ) cameraAngle -= 0.02;
                if (keys.KeyE) cameraAngle += 0.02;

                camera.position.x = player.position.x + Math.sin(cameraAngle) * 10;
                camera.position.z = player.position.z + Math.cos(cameraAngle) * 10;
                camera.position.y = 5;
                camera.lookAt(player.position.x, player.position.y, player.position.z);

                // Check for entering car
                if (keys.KeyE) {
                    for (let car of cars) {
                        if (!car.userData.occupied && player.position.distanceTo(car.position) < 5) {
                            isInCar = true;
                            currentCar = car;
                            car.userData.occupied = true;
                            player.visible = false;
                            camera.position.set(car.position.x, car.position.y + 5, car.position.z + 10);
                            camera.lookAt(car.position);
                            break;
                        }
                    }
                }
            } else {
                let moveZ = 0, rotateY = 0;
                if (keys.KeyW) moveZ -= 1;
                if (keys.KeyS) moveZ += 1;
                if (keys.KeyA) rotateY += 1;
                if (keys.KeyD) rotateY -= 1;

                currentCar.rotation.y += rotateY * rotationSpeed;
                const direction = new THREE.Vector3(0, 0, moveZ).applyQuaternion(currentCar.quaternion);
                const newPos = currentCar.position.clone().add(direction.multiplyScalar(carSpeed));
                const collision = buildings.some(b => newPos.distanceTo(b.position) < 4);
                if (!collision) {
                    currentCar.position.copy(newPos);
                }

                camera.position.x = currentCar.position.x - Math.sin(currentCar.rotation.y) * 10;
                camera.position.z = currentCar.position.z - Math.cos(currentCar.rotation.y) * 10;
                camera.lookAt(currentCar.position);

                // Exit car
                if (keys.KeyE) {
                    isInCar = false;
                    currentCar.userData.occupied = false;
                    player.position.copy(currentCar.position);
                    player.visible = true;
                    currentCar = null;
                    camera.position.set(player.position.x, 5, player.position.z + 10);
                    camera.lookAt(player.position.x, player.position.y, player.position.z);
                }
            }
        }

        function updateNPCs() {
            npcs.forEach(npc => {
                if (npc.userData.type === 'police' && (isInCar || wantedLevel > 0)) {
                    // Police chase player if in car or wanted
                    const targetPos = isInCar ? currentCar.position : player.position;
                    const direction = new THREE.Vector3().subVectors(targetPos, npc.position).normalize();
                    npc.position.add(direction.multiplyScalar(0.03 + wantedLevel * 0.01));
                } else {
                    // Random walk
                    npc.position.add(npc.userData.direction.clone().multiplyScalar(0.05));
                    if (Math.random() < 0.01) {
                        npc.userData.direction.set(Math.random() - 0.5, 0, Math.random() - 0.5).normalize();
                    }
                }
            });
        }

        function updateOtherPlayers() {
            Object.values(otherPlayers).forEach(playerMesh => {
                playerMesh.position.lerp(playerMesh.targetPosition, 0.1);
            });
        }

        function sendPosition() {
            if (!isMultiplayer || !socket) return;
            const pos = isInCar ? currentCar.position : player.position;
            socket.emit('updatePosition', {
                position: pos,
                state: isInCar ? 'inCar' : 'pedestrian',
                carId: currentCar ? cars.indexOf(currentCar) : null,
                nickname: nickname
            });
        }

        function startGame() {
            gameStarted = true;
            console.log('Game started, multiplayer:', isMultiplayer);
            if (isMultiplayer) {
                socket = io(window.location.origin);
                setupSocket();
            }
            // Ensure canvas is visible
            renderer.domElement.style.display = 'block';
            // Start sending position

        }

        function animate() {
            requestAnimationFrame(animate);
            if (!gameStarted) return;
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            updatePlayer();
            updateNPCs();
            updateOtherPlayers();
            document.getElementById('wanted').textContent = wantedLevel;
            renderer.render(scene, camera);
        }
        animate();

        setInterval(sendPosition, 50);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
